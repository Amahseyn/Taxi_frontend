name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install SSH client
        run: sudo apt-get install -y ssh

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e

            DEPLOY_DIR="/home/Taxi/Taxi_frontend"

            git config --global --add safe.directory "$DEPLOY_DIR"

            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              git clone "${{ github.server_url }}/${{ github.repository }}.git" "$DEPLOY_DIR"
            fi

            cd "$DEPLOY_DIR"
            git fetch origin
            git reset --hard origin/main

            if [ ! -f ".env.local" ]; then
              cat > .env.local << EOL
OPENROUTE_SERVICE_API_KEY="${{ secrets.OPENROUTE_SERVICE_API_KEY }}"
EOL
            fi

            npm ci
            npm run build

            pm2 startOrReload ecosystem.config.js
            pm2 save
